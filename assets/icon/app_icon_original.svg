<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#4a7a00"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#76b900" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="36" y="36" width="440" height="440" rx="90" ry="90" fill="url(#bgGrad3)" filter="url(#glow)"/>

  <!-- Capture ring (incomplete circle — 300 degrees) -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#ringGrad)" stroke-width="16"
          stroke-dasharray="650 200" stroke-linecap="round"
          transform="rotate(150 256 256)"/>

  <!-- Play triangle centered -->
  <polygon points="230,208 308,256 230,304" fill="#ffffff" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>

  <!-- Small toggle dot at bottom-right of ring -->
  <circle cx="345" cy="345" r="22" fill="#ffffff"/>
  <circle cx="345" cy="345" r="12" fill="#76b900"/>
</svg>

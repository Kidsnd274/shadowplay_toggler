<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#76B900"/>
      <stop offset="100%" stop-color="#4A7A00"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feFlood flood-color="#76B900" flood-opacity="0.35"/>
      <feComposite in2="offsetBlur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="36" y="36" width="440" height="440" rx="90" fill="url(#bgGrad)" filter="url(#glow)"/>

  <!-- Unified overlay window -->
  <rect x="126" y="116" width="260" height="176" rx="44" fill="#FFFFFF" fill-opacity="0.96"/>

  <!-- Internal top section divider -->
  <line x1="126" y1="160" x2="386" y2="160" stroke="#76B900" stroke-opacity="0.55" stroke-width="4"/>

  <!-- Small header dots -->
  <circle cx="160" cy="138" r="7" fill="#76B900" fill-opacity="0.45"/>
  <circle cx="182" cy="138" r="7" fill="#76B900" fill-opacity="0.45"/>

  <!-- Slightly smaller play -->
  <polygon points="232,190 302,226 232,262" fill="#76B900"/>

  <!-- Better-balanced toggle track -->
  <rect x="176" y="326" width="172" height="84" rx="42" fill="#FFFFFF" fill-opacity="0.28"/>
  <rect x="186" y="336" width="152" height="64" rx="32" fill="#FFFFFF"/>

  <!-- Knob kept in same position -->
  <circle cx="308" cy="368" r="24" fill="#76B900"/>
</svg>
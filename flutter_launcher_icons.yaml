# dart run flutter_launcher_icons
#
# Platform icon sources (SVG → PNG export required before running):
#   Android:  assets/icon/android/ic_launcher_{foreground,background,monochrome}.svg
#   Windows:  assets/icon/windows/app_icon.svg
#   macOS:    assets/icon/macos/app_icon.svg
flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256 # min:48, max:256, default: 48